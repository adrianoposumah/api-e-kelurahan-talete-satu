          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token dari endpoint login

  schemas:
    # ==================== REQUEST SCHEMAS ====================
    RegisterRequest:
      type: object
      required: [nama, no_hp, password]
      properties:
        nama:
          type: string
          description: Nama lengkap user
          example: 'Budi Santoso'
        no_hp:
          type: string
          description: Nomor HP (format 08xxxxxxxxxx, 10-15 digit)
          pattern: '^08\d{8,13}$'
          example: '081234567890'
        password:
          type: string
          format: password
          description: Password minimal 8 karakter, mengandung huruf dan angka
          minLength: 8
          example: 'Password123'

    LoginRequest:
      type: object
      required: [no_hp, password]
      properties:
        no_hp:
          type: string
          description: Nomor HP yang terdaftar
          example: '081234567890'
        password:
          type: string
          format: password
          description: Password user
          example: 'Password123'

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Refresh token yang didapat saat login
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Refresh token yang akan di-revoke
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'

    UserUpdateRequest:
      type: object
      properties:
        nama:
          type: string
          description: Nama lengkap baru (opsional)
          example: 'Budi Santoso Wijaya'
        no_hp:
          type: string
          description: Nomor HP baru (opsional)
          example: '081234567899'
        password:
          type: string
          format: password
          description: Password baru (opsional)
          minLength: 8
          example: 'NewPassword123'

    # ==================== RESPONSE SCHEMAS ====================
    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: 'Login sukses'
        access_token:
          type: string
          description: JWT access token untuk autentikasi
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        refresh_token:
          type: string
          description: JWT refresh token untuk mendapatkan access token baru
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        user:
          $ref: '#/components/schemas/User'

    RefreshResponse:
      type: object
      properties:
        message:
          type: string
          example: 'Access token diperbarui'
        access_token:
          type: string
          description: JWT access token baru
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'

    User:
      type: object
      properties:
        id:
          type: string
          description: User ID (BigInt converted to string)
          example: '1'
        nik:
          type: string
          nullable: true
          description: Nomor Induk Kependudukan (16 digit), null jika belum tervalidasi
          example: '1234567890123456'
        nama:
          type: string
          description: Nama lengkap user
          example: 'Budi Santoso'
        no_hp:
          type: string
          description: Nomor HP user
          example: '081234567890'
        role:
          type: string
          enum: [warga, staff, kepling, lurah, sekertaris, admin]
          description: Role user dalam sistem
          example: 'warga'
        is_validate:
          type: boolean
          description: Status validasi user (true jika sudah tervalidasi)
          example: false
        status:
          type: string
          enum: [active, inactive, banned]
          description: Status akun user
          example: 'active'
        created_at:
          type: string
          format: date-time
          description: Timestamp saat user dibuat
          example: '2026-01-25T10:30:00.000Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp saat user terakhir diupdate
          example: '2026-01-25T10:30:00.000Z'
        kependudukan:
          $ref: '#/components/schemas/DataKependudukan'
          nullable: true
          description: Data kependudukan (hanya muncul jika user sudah tervalidasi)

    DataKependudukan:
      type: object
      properties:
        nik:
          type: string
          description: Nomor Induk Kependudukan
          example: '1234567890123456'
        nama:
          type: string
          description: Nama lengkap sesuai KTP
          example: 'Budi Santoso'
        tempat_lahir:
          type: string
          description: Tempat lahir
          example: 'Jakarta'
        tanggal_lahir:
          type: string
          format: date
          description: Tanggal lahir
          example: '1990-01-15'
        jenis_kelamin:
          type: string
          enum: [L, P]
          description: Jenis kelamin (L = Laki-laki, P = Perempuan)
          example: 'L'
        golongan_darah:
          type: string
          nullable: true
          description: Golongan darah
          example: 'A'
        alamat:
          type: string
          description: Alamat lengkap
          example: 'Jl. Merdeka No. 123'
        rt:
          type: string
          description: RT
          example: '001'
        rw:
          type: string
          description: RW
          example: '002'
        kelurahan:
          type: string
          description: Nama kelurahan
          example: 'Talete Satu'
        kecamatan:
          type: string
          description: Nama kecamatan
          example: 'Kabila'
        kabupaten_kota:
          type: string
          description: Nama kabupaten/kota
          example: 'Bone Bolango'
        provinsi:
          type: string
          description: Nama provinsi
          example: 'Gorontalo'
        status_kawin:
          type: string
          enum: [BELUM_KAWIN, KAWIN, CERAI_HIDUP, CERAI_MATI]
          description: Status perkawinan
          example: 'BELUM_KAWIN'
        agama:
          type: string
          description: Agama
          example: 'Islam'
        pekerjaan:
          type: string
          description: Pekerjaan
          example: 'Karyawan Swasta'
        kewarganegaraan:
          type: string
          description: Kewarganegaraan
          example: 'Indonesia'

    KependudukanRelatedLingkungan:
      type: object
      properties:
        id:
          type: string
          example: '1'
        nama:
          type: string
          example: 'Lingkungan 1'
        kode:
          type: string
          nullable: true
          example: 'L01'

    KependudukanRelatedUser:
      type: object
      properties:
        id:
          type: string
          example: '1'
        nama:
          type: string
          example: 'Budi Santoso'
        role:
          type: string
          enum: [warga, staff, kepling, lurah, sekertaris, admin]
          example: 'warga'
        is_validate:
          type: boolean
          example: true

    KependudukanManagement:
      allOf:
        - $ref: '#/components/schemas/DataKependudukan'
        - type: object
          properties:
            lingkungan_id:
              type: string
              nullable: true
              description: Lingkungan ID (BigInt converted to string)
              example: '1'
            created_at:
              type: string
              format: date-time
              example: '2026-04-25T03:00:00.000Z'
            updated_at:
              type: string
              format: date-time
              example: '2026-04-25T03:10:00.000Z'
            lingkungan:
              $ref: '#/components/schemas/KependudukanRelatedLingkungan'
              nullable: true
            user:
              $ref: '#/components/schemas/KependudukanRelatedUser'
              nullable: true

    KependudukanListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/KependudukanManagement'
        pagination:
          $ref: '#/components/schemas/Pagination'

    KependudukanMasked:
      type: object
      properties:
        nik:
          type: string
          description: Lima karakter awal NIK, sisanya diganti X sesuai jumlah karakter yang disembunyikan
          example: '71720XXXXXXXXXXX'
        nama:
          type: string
          description: Huruf awal tiap kata pada nama, sisanya diganti X sesuai jumlah karakter yang disembunyikan
          example: 'BXXX SXXXXXX'

    KependudukanMaskedListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/KependudukanMasked'

    KependudukanMutationResponse:
      type: object
      properties:
        message:
          type: string
          example: Data kependudukan berhasil dibuat
        data:
          $ref: '#/components/schemas/KependudukanManagement'

    KependudukanCreateRequest:
      type: object
      required: [nik, nama, tempat_lahir, tanggal_lahir, jenis_kelamin, alamat, kelurahan, kecamatan, kabupaten_kota, provinsi, status_kawin, agama, pekerjaan]
      properties:
        nik:
          type: string
          description: NIK 16 digit
          pattern: '^\d{16}$'
          example: '7172010101010001'
        nama:
          type: string
          example: 'Budi Santoso'
        tempat_lahir:
          type: string
          example: 'Tomohon'
        tanggal_lahir:
          type: string
          format: date
          example: '1990-01-01'
        jenis_kelamin:
          type: string
          enum: [L, P]
          example: 'L'
        golongan_darah:
          type: string
          nullable: true
          enum: [A, B, AB, O, TIDAK_DIKETAHUI]
          example: 'O'
        alamat:
          type: string
          example: 'Jl. Merdeka No. 1'
        rt:
          type: string
          nullable: true
          example: '001'
        rw:
          type: string
          nullable: true
          example: '002'
        lingkungan_id:
          type: string
          nullable: true
          description: Lingkungan ID
          example: '1'
        kelurahan:
          type: string
          example: 'Talete Satu'
        kecamatan:
          type: string
          example: 'Tomohon Tengah'
        kabupaten_kota:
          type: string
          example: 'Tomohon'
        provinsi:
          type: string
          example: 'Sulawesi Utara'
        status_kawin:
          type: string
          enum: [BELUM_KAWIN, KAWIN, CERAI_HIDUP, CERAI_MATI]
          example: 'BELUM_KAWIN'
        agama:
          type: string
          example: 'Kristen'
        pekerjaan:
          type: string
          example: 'Wiraswasta'
        kewarganegaraan:
          type: string
          nullable: true
          example: 'WNI'

    KependudukanUpdateRequest:
      type: object
      description: Minimal satu field harus diisi untuk update
      properties:
        nik:
          type: string
          description: Jika diisi harus sama dengan parameter path
          pattern: '^\d{16}$'
          example: '7172010101010001'
        nama:
          type: string
        tempat_lahir:
          type: string
        tanggal_lahir:
          type: string
          format: date
        jenis_kelamin:
          type: string
          enum: [L, P]
        golongan_darah:
          type: string
          nullable: true
          enum: [A, B, AB, O, TIDAK_DIKETAHUI]
        alamat:
          type: string
        rt:
          type: string
          nullable: true
        rw:
          type: string
          nullable: true
        lingkungan_id:
          type: string
          nullable: true
          description: Kosongkan atau null untuk melepas relasi lingkungan
        kelurahan:
          type: string
        kecamatan:
          type: string
        kabupaten_kota:
          type: string
        provinsi:
          type: string
        status_kawin:
          type: string
          enum: [BELUM_KAWIN, KAWIN, CERAI_HIDUP, CERAI_MATI]
        agama:
          type: string
        pekerjaan:
          type: string
        kewarganegaraan:
          type: string

    KependudukanBatchCreatedRow:
      type: object
      properties:
        row:
          type: integer
          example: 2
        nik:
          type: string
          example: '7172010101010001'
        nama:
          type: string
          example: 'Budi Santoso'

    KependudukanBatchFailedRow:
      type: object
      properties:
        row:
          type: integer
          example: 4
        message:
          type: string
          example: 'Field wajib belum diisi: nik'

    KependudukanBatchUploadResponse:
      type: object
      properties:
        message:
          type: string
          example: Batch upload data kependudukan selesai diproses
        data:
          type: object
          properties:
            total_rows:
              type: integer
              example: 5
            created_count:
              type: integer
              example: 3
            failed_count:
              type: integer
              example: 2
            created:
              type: array
              items:
                $ref: '#/components/schemas/KependudukanBatchCreatedRow'
            failed:
              type: array
              items:
                $ref: '#/components/schemas/KependudukanBatchFailedRow'
            expected_columns:
              type: array
              items:
                type: string
              example: [nik, nama, tempatLahir, tanggalLahir, jenisKelamin, golonganDarah, alamat, rt, rw, lingkunganId, kelurahan, kecamatan, kabupatenKota, provinsi, statusKawin, agama, pekerjaan, kewarganegaraan]

    ValidateRequest:
      type: object
      properties:
        id:
          type: string
          description: Validate request ID (BigInt converted to string)
          example: '1'
        user_id:
          type: string
          description: User ID yang mengajukan
          example: '1'
        nik:
          type: string
          description: NIK yang diajukan untuk validasi
          nullable: true
          example: '1234567890123456'
        request_type:
          type: string
          enum: [existing_data, submitted_data]
          description: Jenis permintaan validasi
          example: submitted_data
        submitted_data:
          allOf:
            - $ref: '#/components/schemas/KependudukanCreateRequest'
          nullable: true
          description: Data kependudukan yang diajukan user, terisi untuk request_type submitted_data
        status:
          type: string
          enum: [pending, approved, rejected]
          description: Status permintaan validasi
          example: 'pending'
        admin_notes:
          type: string
          nullable: true
          description: Catatan dari admin
          example: 'Data valid dan sesuai'
        processed_by:
          type: string
          nullable: true
          description: Admin ID yang memproses (null jika belum diproses)
          example: '2'
        processed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp saat diproses (null jika belum diproses)
          example: '2026-01-25T11:00:00.000Z'
        created_at:
          type: string
          format: date-time
          description: Timestamp saat permintaan dibuat
          example: '2026-01-25T10:30:00.000Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp saat permintaan terakhir diupdate
          example: '2026-01-25T10:30:00.000Z'
        user:
          type: object
          nullable: true
          description: Data user yang mengajukan (jika include user)
          properties:
            id:
              type: string
              example: '1'
            nama:
              type: string
              example: 'Budi Santoso'
            no_hp:
              type: string
              example: '081234567890'
        kependudukan:
          $ref: '#/components/schemas/DataKependudukan'
          nullable: true
          description: Data kependudukan dari NIK yang diajukan
        admin:
          type: object
          nullable: true
          description: Data admin yang memproses (jika sudah diproses)
          properties:
            id:
              type: string
              example: '2'
            nama:
              type: string
              example: 'Admin Kelurahan'

    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: Halaman saat ini
          example: 1
        limit:
          type: integer
          description: Jumlah data per halaman
          example: 10
        total:
          type: integer
          description: Total data keseluruhan
          example: 50
        total_pages:
          type: integer
          description: Total halaman
          example: 5

    Error:
      type: object
      properties:
        error:
          type: string
          description: Jenis error
          example: 'Bad Request'
        message:
          type: string
          description: Pesan error detail
          example: 'Data tidak valid'

    ArsipSurat:
      type: object
      properties:
        id:
          type: string
          example: '1'
        direction:
          type: string
          enum: [masuk, keluar]
        nomor_surat:
          type: string
          example: '005/UND/V/2026'
        tanggal_surat:
          type: string
          format: date
        tanggal_diterima:
          type: string
          format: date
          nullable: true
        pihak:
          type: string
          example: 'Kecamatan Tomohon Tengah'
        perihal:
          type: string
          example: 'Undangan rapat koordinasi'
        sifat:
          type: string
          enum: [biasa, penting, segera, rahasia]
        keterangan:
          type: string
          nullable: true
        file_url:
          type: string
          nullable: true
          description: URL lampiran (null jika tidak ada)
        download_url:
          type: string
          nullable: true
        file_type:
          type: string
          nullable: true
        created_by:
          type: object
          properties:
            id:
              type: string
            nama:
              type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ArsipLogEntry:
      type: object
      description: Entri log arsip terpadu (manual atau surat terbit sistem)
      properties:
        source:
          type: string
          enum: [manual, system]
          description: 'manual = dicatat di luar sistem; system = surat terbit IssuedLetter'
        id:
          type: string
        direction:
          type: string
          enum: [masuk, keluar]
        nomor_surat:
          type: string
        tanggal_surat:
          type: string
          format: date-time
        tanggal_diterima:
          type: string
          format: date
          nullable: true
        pihak:
          type: string
        perihal:
          type: string
        sifat:
          type: string
          nullable: true
        keterangan:
          type: string
          nullable: true
        file_url:
          type: string
          nullable: true
        verification_code:
          type: string
          nullable: true
          description: Hanya untuk source=system
        is_revoked:
          type: boolean
        created_at:
          type: string
          format: date-time

    DashboardOverview:
      type: object
      properties:
        cards:
          type: object
          properties:
            total_submissions:
              type: integer
            pending_submissions:
              type: integer
            issued_letters:
              type: integer
            issued_this_month:
              type: integer
            revoked_letters:
              type: integer
            total_penduduk:
              type: integer
            arsip_masuk:
              type: integer
            arsip_keluar:
              type: integer
        submissions_by_status:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
                example: pending_kepling
              count:
                type: integer
        submissions_by_type:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: domisili
              count:
                type: integer
        submissions_by_lingkungan:
          type: array
          items:
            type: object
            properties:
              lingkungan_id:
                type: string
              nama:
                type: string
              count:
                type: integer
        monthly_trend:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
                example: '2026-06'
              submissions:
                type: integer
              issued:
                type: integer
        recent_submissions:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              status:
                type: string
              nama:
                type: string
                nullable: true
              lingkungan:
                type: string
                nullable: true
              created_at:
                type: string
                format: date-time
