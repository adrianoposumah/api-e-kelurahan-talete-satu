  # ==================== ARSIP SURAT ROUTES ====================
  /arsip:
    get:
      tags: [Arsip]
      summary: List arsip surat manual (surat masuk/keluar)
      description: Menampilkan entri arsip yang dicatat manual (di luar alur pengajuan warga). Hanya staff & admin.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: direction
          schema:
            type: string
            enum: [masuk, keluar]
          description: Filter berdasarkan arah surat
        - in: query
          name: search
          schema:
            type: string
          description: Cari pada nomor surat, pihak, atau perihal
        - in: query
          name: start_date
          schema:
            type: string
            format: date
          description: Filter tanggal surat mulai (>=)
        - in: query
          name: end_date
          schema:
            type: string
            format: date
          description: Filter tanggal surat akhir (<=)
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Daftar arsip surat
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArsipSurat'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Bukan staff/admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Arsip]
      summary: Tambah arsip surat (surat masuk/keluar)
      description: Mencatat surat masuk atau keluar eksternal beserta lampiran opsional (JPEG/PNG/PDF, maks 5MB). Hanya staff & admin.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [direction, nomor_surat, tanggal_surat, pihak, perihal]
              properties:
                direction:
                  type: string
                  enum: [masuk, keluar]
                nomor_surat:
                  type: string
                  example: '005/UND/V/2026'
                tanggal_surat:
                  type: string
                  format: date
                  example: '2026-05-20'
                tanggal_diterima:
                  type: string
                  format: date
                  description: Hanya untuk surat masuk
                  example: '2026-05-21'
                pihak:
                  type: string
                  description: Pengirim (masuk) atau tujuan (keluar)
                  example: 'Kecamatan Tomohon Tengah'
                perihal:
                  type: string
                  example: 'Undangan rapat koordinasi'
                sifat:
                  type: string
                  enum: [biasa, penting, segera, rahasia]
                  default: biasa
                keterangan:
                  type: string
                file:
                  type: string
                  format: binary
                  description: Lampiran hasil scan (opsional)
      responses:
        '201':
          description: Arsip surat berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ArsipSurat'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Bukan staff/admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /arsip/log:
    get:
      tags: [Arsip]
      summary: Log arsip terpadu (manual + surat terbit sistem)
      description: Gabungan entri arsip manual dan surat yang diterbitkan sistem (IssuedLetter, dianggap surat keluar), dibaca saat query. Diurutkan tanggal surat menurun. Hanya staff & admin.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: direction
          schema:
            type: string
            enum: [masuk, keluar]
          description: 'Filter arah. masuk hanya entri manual; keluar/kosong menyertakan surat sistem'
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: start_date
          schema:
            type: string
            format: date
        - in: query
          name: end_date
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Log arsip terpadu
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArsipLogEntry'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Bukan staff/admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /arsip/{id}:
    get:
      tags: [Arsip]
      summary: Detail arsip surat
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detail arsip surat
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ArsipSurat'
        '404':
          description: Arsip surat tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Arsip]
      summary: Perbarui arsip surat
      description: Memperbarui sebagian field arsip surat. Mengirim lampiran baru akan mengganti yang lama. Hanya staff & admin.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                direction:
                  type: string
                  enum: [masuk, keluar]
                nomor_surat:
                  type: string
                tanggal_surat:
                  type: string
                  format: date
                tanggal_diterima:
                  type: string
                  format: date
                pihak:
                  type: string
                perihal:
                  type: string
                sifat:
                  type: string
                  enum: [biasa, penting, segera, rahasia]
                keterangan:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Arsip surat berhasil diperbarui
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ArsipSurat'
        '404':
          description: Arsip surat tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Arsip]
      summary: Hapus arsip surat
      description: Menghapus entri arsip beserta lampirannya. Hanya staff & admin.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Arsip surat berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Arsip surat berhasil dihapus'
        '404':
          description: Arsip surat tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /arsip/{id}/file:
    get:
      tags: [Arsip]
      summary: Unduh/lihat lampiran arsip surat
      description: Mengembalikan file lampiran. Tambahkan ?download=true untuk mengunduh sebagai attachment. Hanya staff & admin.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: download
          schema:
            type: boolean
          description: Jika true, file diunduh sebagai attachment
      responses:
        '200':
          description: File lampiran
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '404':
          description: Arsip atau lampiran tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

