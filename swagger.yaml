openapi: 3.0.3
info:
  title: Kelurahan e-Service API
  version: '0.1.0'
  description: REST API untuk autentikasi dan manajemen pengguna sistem layanan administrasi kelurahan.

servers:
  - url: http://localhost:5000/v1
    description: Development server
  - url: https://api.example.com/v1
    description: Production server

tags:
  - name: Auth
    description: Endpoints untuk autentikasi (register, login, refresh, logout)
  - name: Users
    description: Endpoints untuk manajemen profil user
  - name: Validate
    description: Endpoints untuk permintaan validasi user
  - name: Admin
    description: Endpoints khusus admin untuk manajemen user dan validasi
  - name: Kependudukan
    description: Endpoints untuk manajemen data kependudukan (staff/admin/lurah/sekertaris)
  - name: Arsip
    description: Administrasi surat masuk/keluar eksternal dan log arsip terpadu (staff/admin)
  - name: Dashboard
    description: Statistik agregat untuk home dashboard (admin/staff)

paths:
  # ==================== AUTH ROUTES ====================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register user baru
      description: Mendaftarkan user baru dengan nama, nomor HP, dan password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User berhasil dibuat
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Nomor HP sudah terdaftar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login menggunakan no_hp dan password
      description: Login untuk mendapatkan access token dan refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login sukses dan mendapatkan token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Login gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token menggunakan refresh token
      description: Mendapatkan access token baru menggunakan refresh token yang valid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Access token diperbarui
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '400':
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Refresh token invalid atau expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout dan revoke refresh token
      description: Logout dan menghapus refresh token dari database
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout sukses
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logout sukses
        '400':
          description: Data tidak valid atau refresh token tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==================== USER ROUTES ====================
  /users/me:
    get:
      tags: [Users]
      summary: Mendapatkan profil user yang sedang login
      description: Mengambil detail profil user yang sedang terautentikasi
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Users]
      summary: Update profil user
      description: Update nama, nomor HP, atau password user yang sedang login
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Profil berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profil berhasil diupdate
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Tidak ada data yang diupdate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==================== VALIDATE ROUTES ====================
  /validate-requests:
    post:
      tags: [Validate]
      summary: Buat permintaan validasi user
      description: User membuat permintaan validasi dengan NIK
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nik]
              properties:
                nik:
                  type: string
                  description: Nomor Induk Kependudukan (16 digit)
                  example: '1234567890123456'
      responses:
        '201':
          description: Permintaan validasi berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Permintaan validasi berhasil dibuat
                  data:
                    $ref: '#/components/schemas/ValidateRequest'
        '400':
          description: Data tidak valid atau user sudah tervalidasi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: NIK tidak ditemukan dalam data kependudukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: NIK sudah digunakan atau user sudah memiliki permintaan pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /validate-requests/submit-data:
    post:
      tags: [Validate]
      summary: Ajukan data kependudukan baru untuk validasi
      description: User mengirim data kependudukan lengkap. Jika NIK sudah ada di data_kependudukan, field lain diabaikan dan request diproses sebagai validasi NIK existing. Jika NIK belum ada, data baru masuk ke data_kependudukan hanya setelah admin menyetujui permintaan validasi.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KependudukanCreateRequest'
      responses:
        '201':
          description: Data kependudukan berhasil diajukan untuk validasi
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Data kependudukan berhasil diajukan untuk validasi
                  data:
                    $ref: '#/components/schemas/ValidateRequest'
        '400':
          description: Data tidak valid atau user sudah tervalidasi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User atau lingkungan tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: NIK sudah digunakan oleh user lain, user sudah memiliki permintaan pending, atau NIK sedang diajukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /validate-requests/me:
    get:
      tags: [Validate]
      summary: Get permintaan validasi user yang sedang login
      description: Mengambil semua permintaan validasi yang dibuat oleh user yang sedang login
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List permintaan validasi
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ValidateRequest'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==================== KEPENDUDUKAN ROUTES ====================
  /data-kependudukan/masked:
    get:
      tags: [Kependudukan]
      summary: Get data kependudukan termasking
      description: Mengambil daftar maksimal 10 data kependudukan termasking berdasarkan awalan NIK. Dapat diakses semua user yang sudah login.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: nik
          schema:
            type: string
          description: Pencarian berdasarkan beberapa karakter awal NIK
      responses:
        '200':
          description: List maksimal 10 data kependudukan termasking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KependudukanMaskedListResponse'
              example:
                data:
                  - nik: '71720XXXXXXXXXXX'
                    nama: 'BXXX SXXXXXX'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /data-kependudukan:
    get:
      tags: [Kependudukan]
      summary: Get semua data kependudukan
      description: Mengambil daftar data kependudukan dengan pagination dan filter. Hanya untuk role staff, admin, lurah, sekertaris.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Nomor halaman
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Jumlah data per halaman
        - in: query
          name: search
          schema:
            type: string
          description: Pencarian berdasarkan NIK atau nama
        - in: query
          name: lingkungan_id
          schema:
            type: string
          description: Filter berdasarkan ID lingkungan
        - in: query
          name: jenis_kelamin
          schema:
            type: string
            enum: [L, P]
          description: Filter jenis kelamin
        - in: query
          name: status_kawin
          schema:
            type: string
            enum: [BELUM_KAWIN, KAWIN, CERAI_HIDUP, CERAI_MATI]
          description: Filter status kawin
      responses:
        '200':
          description: List data kependudukan dengan pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KependudukanListResponse'
              example:
                data:
                  - nik: '7172010101010001'
                    nama: 'Budi Santoso'
                    tempat_lahir: 'Tomohon'
                    tanggal_lahir: '1990-01-01T00:00:00.000Z'
                    jenis_kelamin: 'L'
                    golongan_darah: 'O'
                    alamat: 'Jl. Merdeka No. 1'
                    rt: '001'
                    rw: '002'
                    lingkungan_id: '1'
                    kelurahan: 'Talete Satu'
                    kecamatan: 'Tomohon Tengah'
                    kabupaten_kota: 'Tomohon'
                    provinsi: 'Sulawesi Utara'
                    status_kawin: 'KAWIN'
                    agama: 'Kristen'
                    pekerjaan: 'Wiraswasta'
                    kewarganegaraan: 'WNI'
                    created_at: '2026-04-25T03:00:00.000Z'
                    updated_at: '2026-04-25T03:10:00.000Z'
                    lingkungan:
                      id: '1'
                      nama: 'Lingkungan 1'
                      kode: 'L01'
                    user:
                      id: '10'
                      nama: 'Budi Santoso'
                      role: 'warga'
                      is_validate: true
                pagination:
                  page: 1
                  limit: 10
                  total: 1
                  total_pages: 1
        '400':
          description: Query parameter tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - role tidak memiliki akses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Kependudukan]
      summary: Buat data kependudukan baru
      description: Menambahkan satu data kependudukan baru
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KependudukanCreateRequest'
            example:
              nik: '7172010101010002'
              nama: 'Sinta Maria'
              tempat_lahir: 'Tomohon'
              tanggal_lahir: '1992-02-10'
              jenis_kelamin: 'P'
              golongan_darah: 'A'
              alamat: 'Jl. Pahlawan No. 3'
              rt: '001'
              rw: '003'
              lingkungan_id: '1'
              kelurahan: 'Talete Satu'
              kecamatan: 'Tomohon Tengah'
              kabupaten_kota: 'Tomohon'
              provinsi: 'Sulawesi Utara'
              status_kawin: 'BELUM_KAWIN'
              agama: 'Kristen'
              pekerjaan: 'Guru'
              kewarganegaraan: 'WNI'
      responses:
        '201':
          description: Data kependudukan berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KependudukanMutationResponse'
              example:
                message: 'Data kependudukan berhasil dibuat'
                data:
                  nik: '7172010101010002'
                  nama: 'Sinta Maria'
                  tempat_lahir: 'Tomohon'
                  tanggal_lahir: '1992-02-10T00:00:00.000Z'
                  jenis_kelamin: 'P'
                  golongan_darah: 'A'
                  alamat: 'Jl. Pahlawan No. 3'
                  rt: '001'
                  rw: '003'
                  lingkungan_id: '1'
                  kelurahan: 'Talete Satu'
                  kecamatan: 'Tomohon Tengah'
                  kabupaten_kota: 'Tomohon'
                  provinsi: 'Sulawesi Utara'
                  status_kawin: 'BELUM_KAWIN'
                  agama: 'Kristen'
                  pekerjaan: 'Guru'
                  kewarganegaraan: 'WNI'
                  created_at: '2026-04-25T04:00:00.000Z'
                  updated_at: '2026-04-25T04:00:00.000Z'
                  lingkungan:
                    id: '1'
                    nama: 'Lingkungan 1'
                    kode: 'L01'
                  user: null
        '400':
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - role tidak memiliki akses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Lingkungan tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: NIK sudah terdaftar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /data-kependudukan/batch-upload:
    post:
      tags: [Kependudukan]
      summary: Batch upload data kependudukan dari file XLSX
      description: Upload file .xlsx (maks 5MB) untuk menambahkan data kependudukan secara massal. Diproses per baris, baris gagal tidak menghentikan proses baris lain.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: File Excel .xlsx
      responses:
        '201':
          description: Semua baris berhasil diproses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KependudukanBatchUploadResponse'
              example:
                message: 'Batch upload data kependudukan selesai diproses'
                data:
                  total_rows: 2
                  created_count: 2
                  failed_count: 0
                  created:
                    - row: 2
                      nik: '7172010101010003'
                      nama: 'Yohan'
                    - row: 3
                      nik: '7172010101010004'
                      nama: 'Maria'
                  failed: []
                  expected_columns: [nik, nama, tempatLahir, tanggalLahir, jenisKelamin, golonganDarah, alamat, rt, rw, lingkunganId, kelurahan, kecamatan, kabupatenKota, provinsi, statusKawin, agama, pekerjaan, kewarganegaraan]
        '200':
          description: Batch diproses dengan sebagian baris gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KependudukanBatchUploadResponse'
              example:
                message: 'Batch upload data kependudukan selesai diproses'
                data:
                  total_rows: 3
                  created_count: 2
                  failed_count: 1
                  created:
                    - row: 2
                      nik: '7172010101010005'
                      nama: 'Arman'
                    - row: 3
                      nik: '7172010101010006'
                      nama: 'Lina'
                  failed:
                    - row: 4
                      message: 'Field wajib belum diisi: nik'
                  expected_columns: [nik, nama, tempatLahir, tanggalLahir, jenisKelamin, golonganDarah, alamat, rt, rw, lingkunganId, kelurahan, kecamatan, kabupatenKota, provinsi, statusKawin, agama, pekerjaan, kewarganegaraan]
        '400':
          description: File tidak valid, ekstensi bukan .xlsx, atau data sheet kosong
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - role tidak memiliki akses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /data-kependudukan/{nik}:
    get:
      tags: [Kependudukan]
      summary: Get data kependudukan berdasarkan NIK
      description: Mengambil detail satu data kependudukan
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: nik
          required: true
          schema:
            type: string
          description: NIK (16 digit)
      responses:
        '200':
          description: Detail data kependudukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KependudukanManagement'
              example:
                nik: '7172010101010001'
                nama: 'Budi Santoso'
                tempat_lahir: 'Tomohon'
                tanggal_lahir: '1990-01-01T00:00:00.000Z'
                jenis_kelamin: 'L'
                golongan_darah: 'O'
                alamat: 'Jl. Merdeka No. 1'
                rt: '001'
                rw: '002'
                lingkungan_id: '1'
                kelurahan: 'Talete Satu'
                kecamatan: 'Tomohon Tengah'
                kabupaten_kota: 'Tomohon'
                provinsi: 'Sulawesi Utara'
                status_kawin: 'KAWIN'
                agama: 'Kristen'
                pekerjaan: 'Wiraswasta'
                kewarganegaraan: 'WNI'
                created_at: '2026-04-25T03:00:00.000Z'
                updated_at: '2026-04-25T03:10:00.000Z'
                lingkungan:
                  id: '1'
                  nama: 'Lingkungan 1'
                  kode: 'L01'
                user:
                  id: '10'
                  nama: 'Budi Santoso'
                  role: 'warga'
                  is_validate: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - role tidak memiliki akses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Data kependudukan tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Kependudukan]
      summary: Update data kependudukan
      description: Update data kependudukan berdasarkan NIK
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: nik
          required: true
          schema:
            type: string
          description: NIK (16 digit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KependudukanUpdateRequest'
            example:
              alamat: 'Jl. Pahlawan No. 99'
              rt: '004'
              rw: '005'
              status_kawin: 'KAWIN'
              lingkungan_id: '2'
      responses:
        '200':
          description: Data kependudukan berhasil diupdate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KependudukanMutationResponse'
              example:
                message: 'Data kependudukan berhasil diupdate'
                data:
                  nik: '7172010101010002'
                  nama: 'Sinta Maria'
                  tempat_lahir: 'Tomohon'
                  tanggal_lahir: '1992-02-10T00:00:00.000Z'
                  jenis_kelamin: 'P'
                  golongan_darah: 'A'
                  alamat: 'Jl. Pahlawan No. 99'
                  rt: '004'
                  rw: '005'
                  lingkungan_id: '2'
                  kelurahan: 'Talete Satu'
                  kecamatan: 'Tomohon Tengah'
                  kabupaten_kota: 'Tomohon'
                  provinsi: 'Sulawesi Utara'
                  status_kawin: 'KAWIN'
                  agama: 'Kristen'
                  pekerjaan: 'Guru'
                  kewarganegaraan: 'WNI'
                  created_at: '2026-04-25T04:00:00.000Z'
                  updated_at: '2026-04-25T05:00:00.000Z'
                  lingkungan:
                    id: '2'
                    nama: 'Lingkungan 2'
                    kode: 'L02'
                  user: null
        '400':
          description: Data tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - role tidak memiliki akses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Data kependudukan atau lingkungan tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Kependudukan]
      summary: Hapus data kependudukan
      description: Menghapus data kependudukan berdasarkan NIK. Ditolak jika data masih terhubung dengan user atau riwayat validasi.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: nik
          required: true
          schema:
            type: string
          description: NIK (16 digit)
      responses:
        '200':
          description: Data kependudukan berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Data kependudukan berhasil dihapus
              example:
                message: Data kependudukan berhasil dihapus
        '400':
          description: Data tidak dapat dihapus karena constraint bisnis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - role tidak memiliki akses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Data kependudukan tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

