openapi: 3.0.3
info:
  title: Kelurahan e-Service API
  version: '0.1.0'
  description: REST API untuk autentikasi dan manajemen pengguna sistem layanan administrasi kelurahan.

servers:
  - url: http://localhost:5000/v1
    description: Development server
  - url: https://api.example.com/v1
    description: Production server

tags:
  - name: Auth
  - name: Users
  - name: Admin

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register user baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User berhasil dibuat
        '400':
          description: Data tidak valid
        '409':
          description: Nomor HP sudah terdaftar

  /auth/login:
    post:
      tags: [Auth]
      summary: Login menggunakan no_hp dan password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login sukses dan mendapatkan token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Login gagal

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token menggunakan refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Access token diperbarui
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Refresh token invalid atau expired

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout dan revoke refresh token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout sukses

  /users/me:
    get:
      tags: [Users]
      summary: Mendapatkan profil user yang sedang login
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      tags: [Users]
      summary: Update profil user
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Profil berhasil diupdate

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [nama, no_hp, password]
      properties:
        nama:
          type: string
          example: 'Budi Santoso'
        no_hp:
          type: string
          example: '081234567890'
        password:
          type: string
          format: password
          minLength: 8

    LoginRequest:
      type: object
      required: [no_hp, password]
      properties:
        no_hp:
          type: string
          example: '081234567890'
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    UserUpdateRequest:
      type: object
      properties:
        nama:
          type: string
        alamat:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        nik:
          type: string
        nama:
          type: string
        no_hp:
          type: string
        role:
          type: string
          enum: [warga, kepling, lurah, admin]
        is_validate:
          type: boolean
        status:
          type: string
          enum: [active, inactive, banned]
        created_at:
          type: string
        updated_at:
          type: string
